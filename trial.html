<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Responsive Footer with Theme Toggle</title>
  <style>
    :root {
      --bg: #111827;
      --text: #d1d5db;
      --heading: #ffffff;
      --link-hover: #ffffff;
      --border: #374151;
    }

    /* Light theme variables */
    input#theme-toggle:checked ~ footer {
      --bg: #f9fafb;
      --text: #374151;
      --heading: #111827;
      --link-hover: #000000;
      --border: #d1d5db;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: var(--bg);
      transition: background-color 0.3s ease;
    }

    footer {
      background-color: var(--bg);
      color: var(--text);
      padding: 2rem 1rem;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    .footer-container {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      gap: 2rem;
      grid-template-columns: 1fr;
    }

    .footer-logo h2 {
      color: var(--heading);
      font-size: 1.25rem;
      margin: 0;
    }

    .footer-logo p {
      margin-top: 0.75rem;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    nav ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    nav li {
      margin-bottom: 0.5rem;
    }

    nav a {
      color: var(--text);
      text-decoration: none;
      transition: color 0.3s ease;
    }

    nav a:hover {
      color: var(--link-hover);
    }

    .footer-social h3 {
      font-size: 0.85rem;
      font-weight: bold;
      text-transform: uppercase;
      margin-bottom: 1rem;
      color: var(--heading);
    }

    .social-icons {
      display: flex;
      gap: 1rem;
    }

    .social-icons a {
      color: var(--text);
      font-size: 1.2rem;
      transition: color 0.3s ease;
    }

    .social-icons a:hover {
      color: var(--link-hover);
    }

    .footer-bottom {
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      font-size: 0.85rem;
      gap: 0.5rem;
    }

    .footer-bottom a {
      color: var(--text);
      text-decoration: none;
      margin: 0 0.5rem;
    }

    .footer-bottom a:hover {
      color: var(--link-hover);
    }

    @media (min-width: 768px) {
      .footer-container {
        grid-template-columns: repeat(3, 1fr);
      }

      .footer-bottom {
        flex-direction: row;
      }
    }

    /* Theme toggle button */
    .theme-toggle-label {
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.9rem;
      color: var(--text);
    }

    .theme-toggle-label span {
      user-select: none;
    }

    input#theme-toggle {
      display: none;
    }
  </style>
  <!-- FontAwesome for icons -->
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>
  <!-- Theme Toggle Switch -->
  <input type="checkbox" id="theme-toggle" />
  <label for="theme-toggle" class="theme-toggle-label" style="padding: 1rem; display:block;">
    <i class="fas fa-moon"></i>
    <span>Dark / Light</span>
  </label>

  <footer>
    <div class="footer-container">
      <!-- Logo & About -->
      <div class="footer-logo">
        <h2>YourBrand</h2>
        <p>Building modern solutions for a connected world.</p>
      </div>

      <!-- Navigation Links -->
      <nav aria-label="Footer navigation">
        <ul>
          <li><a href="#about">About Us</a></li>
          <li><a href="#services">Services</a></li>
          <li><a href="#careers">Careers</a></li>
          <li><a href="#contact">Contact</a></li>
        </ul>
      </nav>

      <!-- Social Media -->
      <div class="footer-social">
        <h3>Follow Us</h3>
        <div class="social-icons">
          <a href="https://facebook.com" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
          <a href="https://twitter.com" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
          <a href="https://linkedin.com" aria-label="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
          <a href="https://instagram.com" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
        </div>
      </div>
    </div>

    <!-- Bottom Section -->
    <div class="footer-bottom">
      <p>&copy; 2025 YourBrand. All rights reserved.</p>
      <div>
        <a href="#privacy">Privacy Policy</a> | 
        <a href="#terms">Terms of Service</a>
      </div>
    </div>
  </footer>
</body>
</html>
